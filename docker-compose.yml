version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: tasklist-db
    environment:
      - POSTGRES_USER=andre
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=tasklist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: